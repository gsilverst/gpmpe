services:
  gpmpe:
    build:
      context: .
      dockerfile: Dockerfile
    image: gpmpe:local
    container_name: gpmpe
    ports:
      - "8000:8000"
    environment:
      - DATA_DIR=/app/data
      - OUTPUT_DIR=/app/output
      - DATABASE_PATH=/app/backend/data/gpmpe.db
    volumes:
      - ./.config:/app/.config:ro
      - gpmpe_output:/app/output
      - gpmpe_db:/app/backend/data
      - gpmpe_data:/app/data
      - ./local:/app/local
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  gpmpe_output:
  gpmpe_db:
  gpmpe_data:
