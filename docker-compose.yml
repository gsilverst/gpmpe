services:
  gpmpe:
    build:
      context: .
      dockerfile: Dockerfile
    image: gpmpe:local
    container_name: gpmpe
    ports:
      - "8000:8000"
    environment:
      - RUN_MODE=local
      - DATA_DIR=/app/data
      - OUTPUT_DIR=/app/output
      - DATABASE_PATH=/app/backend/data/gpmpe.db
    volumes:
      - ./.config:/app/.config:ro
      - gpmpe_output:/app/output
      - gpmpe_db:/app/backend/data
      - gpmpe_data:/app/data
      - ./local:/app/local
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  git-sync-worker:
    image: gpmpe:local
    container_name: gpmpe-sync-worker
    depends_on:
      gpmpe:
        condition: service_healthy
    environment:
      - GPMPE_API_URL=http://gpmpe:8000
      - SYNC_INTERVAL_SECONDS=60
    volumes:
      - ./.config:/app/.config:ro
      - gpmpe_data:/app/data
    entrypoint: ["/app/backend/scripts/git_sync_worker.sh"]

volumes:
  gpmpe_output:
  gpmpe_db:
  gpmpe_data:
